<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Typography polish — current vs proposed</title>
<style>
  :root{
    --bg:#F2F2F7;--card:#FFFFFF;--ink:#1C1C1E;--muted:#8E8E93;--faint:#C7C7CC;
    --sep:rgba(60,60,67,.29);--accent:#007AFF;--good:#34C759;--warn:#FF9500;--track:#E9E9EB;
    --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",system-ui,sans-serif;
  }
  *{box-sizing:border-box}html,body{margin:0}
  body{background:#e8e8ee;font-family:var(--font);-webkit-font-smoothing:antialiased;font-variant-numeric:tabular-nums;color:var(--ink);padding:24px}
  h2.t{text-align:center;font-size:14px;font-weight:600;color:#555;margin:0 auto 26px;max-width:760px;line-height:1.5}
  .cols{display:flex;gap:26px;justify-content:center;flex-wrap:wrap;align-items:flex-start}
  .col{width:390px}
  .cap{text-align:center;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#8a8a90;margin-bottom:10px}
  .phone{background:var(--bg);border-radius:30px;padding:18px 18px 26px;box-shadow:0 14px 44px rgba(0,0,0,.16)}

  .topline{display:flex;align-items:center;min-height:44px}
  .topline .sp{flex:1}
  .brand{display:inline-flex;align-items:center;gap:6px;color:var(--ink)}
  .brand .mk{color:var(--accent)}
  .gear{color:var(--muted);font-size:24px;margin-right:6px}
  .pill{display:inline-flex;align-items:center;background:var(--accent);color:#fff;border-radius:980px;padding:8px 15px;font-size:15px;font-weight:500}

  .sub{color:var(--muted)}
  .label{font-weight:600;text-transform:uppercase;color:var(--muted);margin:22px 4px 8px}

  .list{background:var(--card);border-radius:12px;overflow:hidden}
  .row{display:grid;grid-template-columns:1fr 30px 44px 20px 16px;grid-template-areas:"rn ev rv chk chev" "bar bar bar bar bar";align-items:center;column-gap:9px;row-gap:9px;padding:12px 15px;position:relative}
  .row+.row::before{content:"";position:absolute;top:0;left:15px;right:0;height:1px;background:var(--sep);transform:scaleY(.5)}
  .rn{grid-area:rn}.rn .m{font-size:12px;color:var(--muted);margin-top:2px}
  .pbar{grid-area:bar;height:4px;background:var(--track);border-radius:999px;overflow:hidden}
  .pbar>i{display:block;height:100%;border-radius:inherit}
  .g{background:var(--good)}.a{background:var(--accent)}.o{background:var(--warn)}
  .ev{grid-area:ev;text-align:right;font-weight:600}.ev.met{color:var(--good)}.ev.short{color:var(--warn)}
  .rv{grid-area:rv;color:var(--faint)}
  .chk{grid-area:chk;display:grid;place-items:center}
  .ck{width:18px;height:18px;border-radius:50%;background:var(--good);color:#fff;display:grid;place-items:center;font-size:11px}
  .chev{grid-area:chev;color:var(--faint);font-size:12px;text-align:center}
  .btn{display:block;width:100%;text-align:center;margin-top:22px;background:var(--accent);color:#fff;border-radius:12px;font-weight:600;padding:15px 18px}

  /* ---------- CURRENT ---------- */
  .A .brand{font-size:15px;font-weight:600;letter-spacing:-.01em}
  .A .brand .mk{font-weight:700}
  .A .h1{font-size:34px;line-height:1.21;letter-spacing:-.021em;font-weight:700;margin:4px 0 0}
  .A .sub{font-size:17px;margin-top:6px;letter-spacing:-.01em}
  .A .sub2{font-size:17px;margin-top:2px;letter-spacing:-.01em}
  .A .label{font-size:13px;letter-spacing:.03em}
  .A .rn{font-size:16px;letter-spacing:-.01em}
  .A .ev,.A .rv{font-size:16px}
  .A .btn{font-size:17px}

  /* ---------- PROPOSED ---------- */
  .B .brand{font-size:18px;font-weight:600;letter-spacing:-.02em}
  .B .brand .mk{font-weight:700;font-size:19px}
  .B .h1{font-size:30px;line-height:1.16;letter-spacing:-.024em;font-weight:700;margin:6px 0 0}
  .B .sub{font-size:16px;margin-top:7px;letter-spacing:-.01em}
  .B .sub2{font-size:14px;margin-top:3px;color:var(--faint);letter-spacing:0}
  .B .label{font-size:12.5px;letter-spacing:.05em}
  .B .rn{font-size:16px;letter-spacing:-.01em}
  .B .ev,.B .rv{font-size:16px}
  .B .btn{font-size:17px}
</style>
</head>
<body>
  <h2 class="t">Same screen, two type treatments. Left = current. Right = proposed (bigger wordmark, slightly smaller title, tighter sub-line hierarchy). Everything else — colors, layout, bars — is unchanged.</h2>
  <div class="cols">
    <div class="col">
      <div class="cap">Current</div>
      <div class="phone A" id="A"></div>
    </div>
    <div class="col">
      <div class="cap">Proposed</div>
      <div class="phone B" id="B"></div>
    </div>
  </div>

<script>
  const ROWS=[
    ['Total hours','',18,25,false,false],
    ['Legal Ethics','',4,4,true,true],
    ['Competence','incl. 1 hr Prevention & Detection',1,2,false,true],
    ['Elimination of Bias','incl. 1 hr Implicit Bias',2,2,true,true],
    ['Technology','',1,1,true,true],
    ['Civility','',0,1,false,true],
    ['Participatory','live hours, not self-study',10.5,12.5,false,false],
  ]
  const pct=(e,r)=>Math.max(0,Math.min(100,Math.round(e/r*100)))
  function rows(){
    return `<div class="list">`+ROWS.map(([l,m,e,r,met,exp])=>{
      const p=pct(e,r),fill=met?'g':(p>0?'a':'o')
      return `<div class="row">
        <div class="rn">${l}${m?`<div class="m">${m}</div>`:''}</div>
        <div class="pbar"><i class="${fill}" style="width:${Math.max(p,2)}%"></i></div>
        <div class="ev ${met?'met':'short'}">${e}</div>
        <div class="rv">/ ${r}</div>
        <div class="chk">${met?'<span class="ck">✓</span>':''}</div>
        <div class="chev">${met?'':(exp?'⌄':'')}</div>
      </div>`
    }).join('')+`</div>`
  }
  function screen(){
    return `<div class="topline">
        <span class="brand"><span class="mk">§</span> clekeeper</span>
        <span class="sp"></span>
        <span class="gear">⚙︎</span>
        <span class="pill">Sign in to save</span>
      </div>
      <div class="h1">3 requirements left</div>
      <div class="sub">Reporting cycle: Feb 1, 2024 – Mar 29, 2027</div>
      <div class="sub2">Report by Mar 30, 2027 · 18 of 25 hours logged</div>
      <div class="label">Requirements</div>
      ${rows()}
      <div class="btn">Add a certificate</div>`
  }
  document.getElementById('A').innerHTML=screen()
  document.getElementById('B').innerHTML=screen()
</script>
</body>
</html>
